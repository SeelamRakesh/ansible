- name: conditions demo
  hosts: local
  connections: local
  vars:
   - number of sessions: 7
  tasks: 
  - name: Ansible sessions
    ansible.builtin.debug:
     msg: "Ansible is 7 sessions"
    when: number of sessions > 6












